<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Elegant Parfums" />
  <meta name="application-name" content="Elegant Parfums" />
  <meta name="description" content="Elegant Parfums Inventory Manager" />
  <link rel="manifest" href="/manifest.json" />
  <title>Elegant Parfums · Inventory</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #f0ede6; -webkit-font-smoothing: antialiased; font-family: 'DM Mono', monospace; }
    input, select, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .cat-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'ep-inventory-v1';
      const URLS = ['/'];
      self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS))));
      self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('/')))));
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(() => {});
  }
</script>
<script type="text/babel">
const { useState, useEffect } = React;

const CATEGORIES = ["All", "Perfume", "Home Care", "Raw Materials", "Packaging"];
const STORAGE_KEY = "vault_inventory_v1";

const INITIAL_INVENTORY = [
  { id: 1, name: "Amber Dusk EDP", sku: "AD-EDP-50", category: "Perfume", unit: "bottle", quantity: 24, lowStock: 10, costPrice: 85, sellingPrice: 350, notes: "50ml · Warm oud unisex" },
  { id: 2, name: "BLVCK OUD EDP", sku: "BO-EDP-50", category: "Perfume", unit: "bottle", quantity: 8, lowStock: 10, costPrice: 95, sellingPrice: 420, notes: "50ml · Niche gentleman" },
  { id: 3, name: "Oud Bakhoor Chips", sku: "HC-OUD-250", category: "Home Care", unit: "pack", quantity: 40, lowStock: 15, costPrice: 30, sellingPrice: 120, notes: "250g resealable pack" },
  { id: 4, name: "Reed Diffuser – Amber", sku: "HC-RD-AMB", category: "Home Care", unit: "unit", quantity: 17, lowStock: 8, costPrice: 45, sellingPrice: 180, notes: "200ml · 8 reeds" },
  { id: 5, name: "Oud Attar (raw)", sku: "RM-OUD-ATT", category: "Raw Materials", unit: "ml", quantity: 500, lowStock: 100, costPrice: 2.5, sellingPrice: null, notes: "Cambodian origin" },
  { id: 6, name: "Amber Resinoid", sku: "RM-AMB-RES", category: "Raw Materials", unit: "g", quantity: 320, lowStock: 100, costPrice: 0.8, sellingPrice: null, notes: "Synthetic amber base" },
  { id: 7, name: "50ml Flacon Bottle", sku: "PK-FLC-50", category: "Packaging", unit: "unit", quantity: 60, lowStock: 20, costPrice: 12, sellingPrice: null, notes: "Black glass + gold cap" },
  { id: 8, name: "Gift Box – Black Kraft", sku: "PK-BOX-BLK", category: "Packaging", unit: "unit", quantity: 35, lowStock: 20, costPrice: 5, sellingPrice: null, notes: "Fits 50ml bottle" },
];

const formatZAR = (v) => v == null ? "—" : `R${Number(v).toLocaleString("en-ZA", { minimumFractionDigits: 2 })}`;
const EMPTY_FORM = { name: "", sku: "", category: "Perfume", unit: "unit", quantity: "", lowStock: "", costPrice: "", sellingPrice: "", notes: "" };

const catColor = (c) => ({ "Perfume": "rgba(180,120,255,0.18)", "Home Care": "rgba(0,229,160,0.15)", "Raw Materials": "rgba(255,180,50,0.15)", "Packaging": "rgba(100,180,255,0.15)" }[c] || "rgba(255,255,255,0.08)");
const stockColor = (item) => item.quantity === 0 ? "#ff4d4d" : item.quantity <= item.lowStock ? "#ffaa00" : "#00e5a0";

function App() {
  const [inventory, setInventory] = useState(() => {
    try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : INITIAL_INVENTORY; } catch { return INITIAL_INVENTORY; }
  });
  const [filter, setFilter] = useState("All");
  const [search, setSearch] = useState("");
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState(EMPTY_FORM);
  const [adjustQty, setAdjustQty] = useState("");
  const [toast, setToast] = useState(null);
  const [view, setView] = useState("list");

  useEffect(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory)); } catch {} }, [inventory]);

  const showToast = (msg, type = "success") => { setToast({ msg, type }); setTimeout(() => setToast(null), 2800); };
  const nextId = () => Math.max(0, ...inventory.map(i => i.id)) + 1;

  const displayed = inventory.filter(item => {
    const catMatch = filter === "All" || item.category === filter;
    const q = search.toLowerCase();
    return catMatch && (!q || item.name.toLowerCase().includes(q) || item.sku.toLowerCase().includes(q));
  });

  const lowItems = inventory.filter(i => i.quantity <= i.lowStock);
  const totalValue = inventory.reduce((s, i) => s + i.quantity * i.costPrice, 0);
  const totalSellValue = inventory.filter(i => i.sellingPrice).reduce((s, i) => s + i.quantity * (i.sellingPrice || 0), 0);

  const openAdd = () => { setForm(EMPTY_FORM); setModal({ mode: "add" }); };
  const openEdit = (item) => { setForm({ ...item, costPrice: item.costPrice ?? "", sellingPrice: item.sellingPrice ?? "" }); setModal({ mode: "edit", item }); };
  const openAdjust = (item) => { setAdjustQty(""); setModal({ mode: "adjust", item }); };
  const closeModal = () => setModal(null);

  const saveItem = () => {
    if (!form.name.trim() || !form.sku.trim() || form.quantity === "" || form.costPrice === "") { showToast("Fill in all required fields.", "error"); return; }
    const item = { ...form, id: modal.mode === "add" ? nextId() : modal.item.id, quantity: Number(form.quantity), lowStock: Number(form.lowStock) || 0, costPrice: Number(form.costPrice), sellingPrice: form.sellingPrice !== "" ? Number(form.sellingPrice) : null };
    if (modal.mode === "add") { setInventory(prev => [...prev, item]); showToast(`"${item.name}" added.`); }
    else { setInventory(prev => prev.map(i => i.id === modal.item.id ? item : i)); showToast(`"${item.name}" updated.`); }
    closeModal();
  };

  const applyAdjust = (type) => {
    const delta = Number(adjustQty);
    if (!delta || isNaN(delta)) { showToast("Enter a valid quantity.", "error"); return; }
    setInventory(prev => prev.map(i => i.id !== modal.item.id ? i : { ...i, quantity: type === "add" ? i.quantity + delta : Math.max(0, i.quantity - delta) }));
    showToast(`Stock ${type === "add" ? "added" : "removed"}: ${delta} ${modal.item.unit}(s).`);
    closeModal();
  };

  const deleteItem = (id) => {
    const item = inventory.find(i => i.id === id);
    if (!window.confirm(`Delete "${item.name}"?`)) return;
    setInventory(prev => prev.filter(i => i.id !== id));
    showToast(`"${item.name}" removed.`, "warn");
  };

  const F = (key) => (e) => setForm(p => ({ ...p, [key]: e.target.value }));

  return (
    <div style={{ minHeight: "100vh", background: "#0a0a0a", color: "#f0ede6", maxWidth: 600, margin: "0 auto" }}>

      {/* HEADER */}
      <header style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", padding: "40px 20px 20px", borderBottom: "1px solid rgba(255,255,255,0.07)" }}>
        <div>
          <div style={{ fontSize: 11, color: "#c9a96e", letterSpacing: 6, marginBottom: 4 }}>✦</div>
          <h1 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 28, fontWeight: 700, letterSpacing: 4, color: "#f0ede6", margin: "0 0 2px" }}>ELEGANT PARFUMS</h1>
          <p style={{ color: "#555", fontSize: 10, letterSpacing: 2, textTransform: "uppercase" }}>Fragrance & Home · Inventory</p>
        </div>
        <button onClick={openAdd} style={{ background: "#c9a96e", color: "#0a0a0a", border: "none", padding: "10px 20px", fontSize: 12, fontWeight: 700, letterSpacing: 2, cursor: "pointer", textTransform: "uppercase" }}>+ Add</button>
      </header>

      {/* NAV */}
      <div style={{ display: "flex", borderBottom: "1px solid rgba(255,255,255,0.07)" }}>
        {["list", "stats"].map(v => (
          <button key={v} onClick={() => setView(v)} style={{ flex: 1, background: "transparent", border: "none", borderBottom: view === v ? "2px solid #c9a96e" : "2px solid transparent", color: view === v ? "#c9a96e" : "#555", padding: "14px", fontSize: 12, cursor: "pointer", letterSpacing: 1 }}>
            {v === "list" ? "📦 Inventory" : "📊 Overview"}
          </button>
        ))}
      </div>

      {view === "stats" ? (
        <div style={{ padding: "20px 16px 80px" }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 28 }}>
            {[
              { label: "Total SKUs", value: inventory.length },
              { label: "Stock Value", value: formatZAR(totalValue) },
              { label: "Potential Revenue", value: formatZAR(totalSellValue) },
              { label: "Low Stock Alerts", value: lowItems.length, warn: lowItems.length > 0 },
            ].map(stat => (
              <div key={stat.label} style={{ background: "rgba(255,255,255,0.03)", border: `1px solid ${stat.warn ? "#ffaa00" : "rgba(255,255,255,0.07)"}`, padding: "20px 16px" }}>
                <div style={{ fontSize: 24, fontWeight: 700, fontFamily: "'Playfair Display', Georgia, serif", color: stat.warn ? "#ffaa00" : "#f0ede6" }}>{stat.value}</div>
                <div style={{ fontSize: 10, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginTop: 4 }}>{stat.label}</div>
              </div>
            ))}
          </div>
          <div style={{ fontSize: 10, color: "#555", letterSpacing: 3, textTransform: "uppercase", marginBottom: 14 }}>By Category</div>
          {CATEGORIES.filter(c => c !== "All").map(cat => {
            const items = inventory.filter(i => i.category === cat);
            const val = items.reduce((s, i) => s + i.quantity * i.costPrice, 0);
            return (
              <div key={cat} style={{ display: "flex", alignItems: "center", padding: "12px 0", borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                <span style={{ display: "inline-block", padding: "3px 10px", fontSize: 9, letterSpacing: 1.5, textTransform: "uppercase", color: "#ccc", background: catColor(cat), marginRight: 12 }}>{cat}</span>
                <span style={{ color: "#aaa", fontSize: 12, flex: 1 }}>{items.length} SKUs</span>
                <span style={{ fontWeight: 600, fontSize: 13 }}>{formatZAR(val)}</span>
              </div>
            );
          })}
          {lowItems.length > 0 && (
            <>
              <div style={{ fontSize: 10, color: "#ffaa00", letterSpacing: 3, textTransform: "uppercase", margin: "28px 0 14px" }}>⚠ Low Stock</div>
              {lowItems.map(item => (
                <div key={item.id} style={{ display: "flex", alignItems: "center", padding: "12px 0", borderBottom: "1px solid rgba(255,170,0,0.1)" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, color: "#f0ede6" }}>{item.name}</div>
                    <div style={{ fontSize: 11, color: "#666" }}>{item.sku}</div>
                  </div>
                  <span style={{ color: stockColor(item), fontWeight: 700 }}>{item.quantity} left</span>
                </div>
              ))}
            </>
          )}
        </div>
      ) : (
        <>
          {lowItems.length > 0 && (
            <div style={{ background: "rgba(255,170,0,0.1)", borderBottom: "1px solid rgba(255,170,0,0.2)", color: "#ffaa00", fontSize: 11, padding: "10px 20px" }}>
              ⚠ {lowItems.length} item{lowItems.length > 1 ? "s" : ""} low: {lowItems.map(i => i.name).join(", ")}
            </div>
          )}
          <div style={{ padding: "16px 16px 0" }}>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍  Search name or SKU…" style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", color: "#f0ede6", padding: "12px 16px", fontSize: 13, outline: "none", boxSizing: "border-box" }} />
          </div>
          <div className="cat-scroll" style={{ display: "flex", gap: 8, overflowX: "auto", padding: "14px 16px", scrollbarWidth: "none" }}>
            {CATEGORIES.map(c => (
              <button key={c} onClick={() => setFilter(c)} style={{ background: filter === c ? "rgba(201,169,110,0.08)" : "transparent", border: `1px solid ${filter === c ? "#c9a96e" : "rgba(255,255,255,0.08)"}`, color: filter === c ? "#c9a96e" : "#555", padding: "6px 14px", fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase", cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>{c}</button>
            ))}
          </div>
          <div style={{ padding: "8px 16px 80px", display: "flex", flexDirection: "column", gap: 12 }}>
            {displayed.length === 0 && <div style={{ textAlign: "center", color: "#444", padding: "60px 20px", fontSize: 13 }}>No items found.</div>}
            {displayed.map(item => (
              <div key={item.id} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", padding: "16px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 600, color: "#f0ede6", marginBottom: 2 }}>{item.name}</div>
                    <div style={{ fontSize: 11, color: "#555", letterSpacing: 1 }}>{item.sku}</div>
                  </div>
                  <span style={{ display: "inline-block", padding: "3px 10px", fontSize: 9, letterSpacing: 1.5, textTransform: "uppercase", color: "#ccc", background: catColor(item.category), flexShrink: 0 }}>{item.category}</span>
                </div>
                {item.notes && <div style={{ fontSize: 11, color: "#555", marginBottom: 8 }}>{item.notes}</div>}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, borderTop: "1px solid rgba(255,255,255,0.05)", borderBottom: "1px solid rgba(255,255,255,0.05)", padding: "10px 0", margin: "10px 0" }}>
                  {[
                    { val: item.quantity, label: item.unit + "(s)", color: stockColor(item), big: true },
                    { val: formatZAR(item.costPrice), label: "cost" },
                    { val: formatZAR(item.sellingPrice), label: "sell" },
                    { val: formatZAR(item.quantity * item.costPrice), label: "value" },
                  ].map((st, i) => (
                    <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                      <span style={{ fontSize: st.big ? 20 : 12, fontWeight: st.big ? 700 : 600, color: st.color || "#d0cdc6" }}>{st.val}</span>
                      <span style={{ fontSize: 9, color: "#444", letterSpacing: 1.5, textTransform: "uppercase" }}>{st.label}</span>
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => openAdjust(item)} style={{ flex: 1, background: "transparent", border: "1px solid rgba(255,255,255,0.08)", color: "#888", padding: "8px", fontSize: 11, cursor: "pointer", letterSpacing: 1 }}>⇅ Adjust</button>
                  <button onClick={() => openEdit(item)} style={{ flex: 1, background: "transparent", border: "1px solid rgba(255,255,255,0.08)", color: "#888", padding: "8px", fontSize: 11, cursor: "pointer", letterSpacing: 1 }}>✎ Edit</button>
                  <button onClick={() => deleteItem(item.id)} style={{ background: "transparent", border: "1px solid rgba(255,100,100,0.2)", color: "#ff6b6b", padding: "8px 14px", fontSize: 11, cursor: "pointer" }}>✕</button>
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      {/* MODAL */}
      {modal && (
        <div onClick={closeModal} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 100, display: "flex", alignItems: "flex-end" }}>
          <div onClick={e => e.stopPropagation()} style={{ background: "#111", borderTop: "1px solid rgba(255,255,255,0.1)", padding: "28px 20px 50px", width: "100%", maxHeight: "90vh", overflowY: "auto" }}>
            <h2 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 22, color: "#f0ede6", marginBottom: 20, letterSpacing: 2 }}>
              {modal.mode === "adjust" ? "Adjust Stock" : modal.mode === "add" ? "New Item" : "Edit Item"}
            </h2>

            {modal.mode === "adjust" ? (
              <>
                <p style={{ color: "#aaa", marginBottom: 16, fontSize: 13 }}>{modal.item.name} · <strong style={{ color: "#fff" }}>{modal.item.quantity} {modal.item.unit}(s)</strong> in stock</p>
                <label style={{ display: "block", fontSize: 10, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>Quantity *</label>
                <input type="number" min="0" value={adjustQty} onChange={e => setAdjustQty(e.target.value)} placeholder="e.g. 12" style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", color: "#f0ede6", padding: "12px 14px", fontSize: 14, outline: "none", boxSizing: "border-box", marginBottom: 20 }} />
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <button onClick={() => applyAdjust("add")} style={{ background: "#00e5a0", color: "#0a0a0a", border: "none", padding: "14px", fontSize: 12, fontWeight: 700, cursor: "pointer", letterSpacing: 2 }}>+ Add Stock</button>
                  <button onClick={() => applyAdjust("remove")} style={{ background: "#ff4d4d", color: "#fff", border: "none", padding: "14px", fontSize: 12, fontWeight: 700, cursor: "pointer", letterSpacing: 2 }}>− Remove</button>
                </div>
                <button onClick={closeModal} style={{ display: "block", width: "100%", background: "transparent", color: "#555", border: "1px solid rgba(255,255,255,0.08)", padding: "12px", fontSize: 12, cursor: "pointer", marginTop: 10 }}>Cancel</button>
              </>
            ) : (
              <>
                {[["Item Name *", "name", "e.g. Amber Dusk EDP", "text"], ["SKU *", "sku", "e.g. AD-EDP-50", "text"]].map(([lbl, key, ph, type]) => (
                  <div key={key}>
                    <label style={{ display: "block", fontSize: 10, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6, marginTop: 16 }}>{lbl}</label>
                    <input type={type} value={form[key]} onChange={F(key)} placeholder={ph} style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", color: "#f0ede6", padding: "12px 14px", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                  </div>
                ))}
                <label style={{ display: "block", fontSize: 10, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6, marginTop: 16 }}>Category</label>
                <select value={form.category} onChange={F("category")} style={{ width: "100%", background: "#1a1a1a", border: "1px solid rgba(255,255,255,0.1)", color: "#f0ede6", padding: "12px 14px", fontSize: 14, outline: "none", boxSizing: "border-box" }}>
                  {CATEGORIES.filter(c => c !== "All").map(c => <option key={c}>{c}</option>)}
                </select>
                <label style={{ display: "block", fontSize: 10, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6, marginTop: 16 }}>Unit</label>
                <input value={form.unit} onChange={F("unit")} placeholder="bottle, g, ml, pack…" style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", color: "#f0ede6", padding: "12px 14px", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  {[["Quantity *", "quantity", "0"], ["Low Stock Alert", "lowStock", "10"]].map(([lbl, key, ph]) => (
                    <div key={key}>
                      <label style={{ display: "block", fontSize: 10, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6, marginTop: 16 }}>{lbl}</label>
                      <input type="number" value={form[key]} onChange={F(key)} placeholder={ph} style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", color: "#f0ede6", padding: "12px 14px", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                    </div>
                  ))}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  {[["Cost Price (R) *", "costPrice", "0.00"], ["Selling Price (R)", "sellingPrice", "Optional"]].map(([lbl, key, ph]) => (
                    <div key={key}>
                      <label style={{ display: "block", fontSize: 10, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6, marginTop: 16 }}>{lbl}</label>
                      <input type="number" value={form[key]} onChange={F(key)} placeholder={ph} style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", color: "#f0ede6", padding: "12px 14px", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                    </div>
                  ))}
                </div>
                <label style={{ display: "block", fontSize: 10, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6, marginTop: 16 }}>Notes</label>
                <input value={form.notes} onChange={F("notes")} placeholder="Size, origin, description…" style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", color: "#f0ede6", padding: "12px 14px", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                <button onClick={saveItem} style={{ display: "block", width: "100%", background: "#c9a96e", color: "#0a0a0a", border: "none", padding: "14px", fontSize: 12, fontWeight: 700, cursor: "pointer", letterSpacing: 2, textTransform: "uppercase", marginTop: 24 }}>Save Item</button>
                <button onClick={closeModal} style={{ display: "block", width: "100%", background: "transparent", color: "#555", border: "1px solid rgba(255,255,255,0.08)", padding: "12px", fontSize: 12, cursor: "pointer", marginTop: 10 }}>Cancel</button>
              </>
            )}
          </div>
        </div>
      )}

      {toast && (
        <div style={{ position: "fixed", bottom: 20, left: "50%", transform: "translateX(-50%)", zIndex: 200, padding: "12px 24px", fontSize: 12, fontWeight: 700, letterSpacing: 1.5, color: "#0a0a0a", whiteSpace: "nowrap", background: toast.type === "error" ? "#ff4d4d" : toast.type === "warn" ? "#ffaa00" : "#00e5a0" }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
